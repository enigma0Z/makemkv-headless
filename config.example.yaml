# Fill out the values in this file and then copy it to `config.yaml`

# The port to listen on (default 4000)
# listen_port: 4000

# This config file (optional)
# config_file: ./config.yaml

# Your API token from TMDB
tmdb_token: abcdefghjk....

# The path to the `makemkvcon` binary
makemkvcon_path: /usr/bin/makemkvcon

# The device of the optical drive
source: dev:/dev/disk8

# Frontend selection is done in the following order:
# 1. configured frontend endpoint, via `frontend`
# 2. configured frontend path, hosting frontend files via the api
# 3. Embedded UI (nothing else configured)

# The URL to the frontend host, if you aren't using the internal UI
# frontend: null

# The path to a set of frontend JS / HTML, if you aren't using the embedded UI
# ui_path: null

# Where to rsync files to once they're extracted, in rsync cli format, ala
# [[user@]host:]path/to/destination -- Note that rsync will also copy files
# around locally, no need to include the `user@host:` part if you are copying
# locally.  This will create folders at the destination in the following format
# (from the frontend form): <config destination>/<library>/<format>/<content>/<name>
destination: the/path/to/your/jellyfin/library

# Where to store files directly after they are ripped.  This is where
# `makemkvcon` will drop its files (within a temporary directory therein).  This
# is a **TRUE PREFIX** so if you do not include the trailing slash, it'll create
# folders in that destination with the prefix name.
temp_prefix: /tmp/makemkv-headless

# Log level. ERROR WARNING INFO DEBUG
# log_level: INFO

# Where to store logs (overwritten on startup) -- if unset, defaults to stderr
# log_file: api.log

# Allowed origins for the frontend to talk to the backend.  If you are running
# headless on a remote server, put the remote server's IP and/or hostname here.
# cors_origins: 
#   - http://hostname.of.headless.server:3000
#   - http://ip.of.headless.server:3000

# Whether to run as a daemon, e.g. quit immediately and run in the background.
# It is highly recommended to also have a configured log file if you plan on
# running as a daemon
# daemon: true

# The file to store the pid of the daemon process
# pid_file: mmh.pid
