on:
  pull_request:
    types:
      - closed

jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          git remote get-url origin
          git status
          git branch --show-current
          git log --quiet
          git log --quiet | grep -q '[major]' && echo 'major update'
          git log --quiet | grep -q '[minor]' && echo 'minor update'
          git log --quiet | grep -q '[patch]' && echo 'patch update'
