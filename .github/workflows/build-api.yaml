name: API - Build & Test
on: 
  workflow_dispatch: {}
  pull_request: 
    paths: &paths
      - api/**/*.py
  push:
    branches: 
      - main
    paths: *paths

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-test-python
        with:
          project: api